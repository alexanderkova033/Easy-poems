<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- TODO: update title, description, and og:url once you have a domain -->
    <title>Easy Poems — Poetry Workshop</title>
    <meta
      name="description"
      content="A local-first poetry workshop for drafting, revising, and analysing poems with built-in writing tools — syllables, meter, rhyme, spelling, and more."
    />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Open Graph / social preview -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://easy-poems.vercel.app/" />
    <meta property="og:title" content="Easy Poems — Poetry Workshop" />
    <meta
      property="og:description"
      content="A local-first poetry workshop for drafting, revising, and analysing poems with built-in writing tools — syllables, meter, rhyme, spelling, and more."
    />

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Easy Poems — Poetry Workshop" />
    <meta
      name="twitter:description"
      content="A local-first poetry workshop for drafting, revising, and analysing poems with built-in writing tools."
    />

    <!-- Google Fonts — display=swap is already set so text renders with system fallbacks while fonts load -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Alegreya:ital,wght@0,400;0,500;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,700;1,400&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Serif+Display:ital@0;1&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Literata:ital,opsz,wght@0,7..72,400;0,7..72,500;0,7..72,600;1,7..72,400&family=Lora:ital,wght@0,400;0,600;1,400&family=Merriweather:ital,wght@0,400;0,700;1,400&family=Nunito:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400&family=Source+Sans+3:ital,wght@0,400;0,600;1,400&family=Source+Serif+4:ital,wght@0,400;0,600;1,400&family=Spectral:ital,wght@0,400;0,600;1,400&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <noscript>
      <div style="font-family:Georgia,serif;max-width:480px;margin:4rem auto;padding:2rem;text-align:center;color:#253028;background:#f6faf7;border-radius:12px;border:1px solid #cfd9d1;">
        <p style="font-size:1.15rem;margin:0 0 0.75rem;">Easy Poems requires JavaScript to run.</p>
        <p style="font-size:0.9rem;color:#4d5f54;margin:0;">Please enable JavaScript in your browser settings and reload the page.</p>
      </div>
    </noscript>
    <div id="root"></div>
    <script type="module" src="/src/app/main.tsx"></script>
  </body>
</html>
