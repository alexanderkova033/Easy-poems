openapi: 3.1.0
info:
  title: Easy-poems API
  version: 1.0.0
  description: |
    Server-side proxy for poem analysis. See docs/AI_INTEGRATION.md for narrative contract.
servers:
  - url: http://localhost:8787
    description: Local default (PORT env overrides)
paths:
  /health:
    get:
      summary: Liveness and configured model name
      operationId: getHealth
      parameters:
        - name: X-Request-Id
          in: header
          required: false
          schema:
            type: string
            maxLength: 128
      responses:
        "200":
          description: OK
          headers:
            X-Request-Id:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /api/analyze:
    post:
      summary: Analyze poem lines via OpenAI
      operationId: postAnalyze
      parameters:
        - name: X-Request-Id
          in: header
          required: false
          schema:
            type: string
            maxLength: 128
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalyzeRequest"
      responses:
        "200":
          description: Normalized critique
          headers:
            X-Request-Id:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyzeSuccessResponse"
        "400":
          description: Invalid body or exceeds MAX_POEM_LINES
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Rate limit exceeded (when RATE_LIMIT_MAX is set)
          headers:
            Retry-After:
              schema:
                type: integer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server misconfiguration (e.g. missing API key)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Upstream or unrecoverable model response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "504":
          description: Analysis timed out (OpenAI or server request timeout)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthResponse:
      type: object
      required: [ok, model]
      properties:
        ok:
          type: boolean
          const: true
        model:
          type: string
    AnalyzeRequest:
      type: object
      required: [lines]
      description: |
        Each array element is one visual line (1-based indexing for AI).
        Server rejects more than MAX_POEM_LINES (default 500).
      properties:
        title:
          type: string
        lines:
          type: array
          minItems: 1
          items:
            type: string
    AnalyzeMeta:
      type: object
      required: [model, analyzedAt]
      properties:
        model:
          type: string
        analyzedAt:
          type: string
          format: date-time
    Dimensions:
      type: object
      required: [imagery, musicality, originality, clarity]
      properties:
        imagery:
          type: integer
          minimum: 1
          maximum: 100
        musicality:
          type: integer
          minimum: 1
          maximum: 100
        originality:
          type: integer
          minimum: 1
          maximum: 100
        clarity:
          type: integer
          minimum: 1
          maximum: 100
    AnalyzeIssue:
      type: object
      required: [id, line_start, line_end, rationale, improvements]
      properties:
        id:
          type: string
          maxLength: 64
        line_start:
          type: integer
          minimum: 1
        line_end:
          type: integer
          minimum: 1
        excerpt:
          type: string
          maxLength: 280
        rationale:
          type: string
          maxLength: 2000
        improvements:
          type: array
          minItems: 1
          maxItems: 3
          items:
            type: string
    AnalyzeSuccessResponse:
      type: object
      required: [meta, overall_score, dimensions, issues]
      properties:
        meta:
          $ref: "#/components/schemas/AnalyzeMeta"
        overall_score:
          type: integer
          minimum: 1
          maximum: 100
        dimensions:
          $ref: "#/components/schemas/Dimensions"
        issues:
          type: array
          maxItems: 8
          items:
            $ref: "#/components/schemas/AnalyzeIssue"
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
